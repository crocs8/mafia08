version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mafia42-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mafia42

  server:
    build: ./server
    container_name: mafia42-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/mafia42
      JWT_SECRET: mafia42_super_secret_key_change_in_prod
      CLIENT_URL: http://localhost:3000
      PORT: 5000
    depends_on:
      - mongodb

  client:
    build: ./client
    container_name: mafia42-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mongo_data:
